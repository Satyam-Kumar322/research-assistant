<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Research Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --border: #1f2d45;
      --accent: #4f9cf9;
      --accent2: #a78bfa;
      --text: #e8edf5;
      --muted: #6b7fa3;
      --error: #f87171;
      --success: #34d399;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(79,156,249,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(79,156,249,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove { 100% { background-position: 50px 50px; } }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.1; pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; background: #a78bfa; top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: #4f9cf9; bottom: -80px; left: -80px; }

    .container {
      width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 44px;
      position: relative;
      z-index: 1;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: var(--text);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0b0f1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,156,249,0.12); }
    input::placeholder { color: #2d3f5e; }

    .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* Password strength bar */
    .strength-bar { height: 3px; border-radius: 2px; background: var(--border); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .login-link { text-align: center; margin-top: 22px; font-size: 13px; color: var(--muted); }
    .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }

    .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; }
    .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--success); }
    .alert.show { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <div class="brand-row">
      <div class="brand-icon">🔬</div>
      <span class="brand-name">Research Assistant</span>
    </div>

    <h2>Create your account</h2>
    <p class="subtitle">Start your intelligent research journey</p>

    <div id="alertBox" class="alert"></div>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Dr. Jane Smith" autocomplete="name"/>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@university.edu" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    </div>

    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="Repeat your password"/>
    </div>

    <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Create Account</button>

    <p class="login-link">Already have an account? <a href="/">Sign in</a></p>
  </div>

  <script>
    function checkStrength(val) {
      const fill = document.getElementById('strengthFill');
      if (val.length < 3) { fill.style.width = '0%'; return; }
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['', '#f87171', '#fb923c', '#facc15', '#34d399', '#22c55e'];
      fill.style.width = (score * 20) + '%';
      fill.style.background = colors[score];
    }

    async function handleRegister() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('registerBtn');

      if (!name || !email || !password || !confirm) {
        showAlert('Please fill in all fields.', 'error'); return;
      }
      if (password.length < 6) {
        showAlert('Password must be at least 6 characters.', 'error'); return;
      }
      if (password !== confirm) {
        showAlert('Passwords do not match.', 'error'); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Creating account...';
      hideAlert();

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.detail || 'Registration failed.', 'error'); return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert(`Account created! Welcome, ${data.user.name}! Redirecting...`, 'success');
        setTimeout(() => window.location.href = '/dashboard', 1200);
      } catch (err) {
        showAlert('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = `alert ${type} show`;
    }
    function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
  </script>
</body>
</html>
